# HTTP Redirect to HTTPS
server {
    listen 80;
    server_name winpexauto.com plexium-tec.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Domain 1: winpexauto.com (Makrem ERP)
server {
    listen 443 ssl;
    server_name winpexauto.com;

    ssl_certificate /etc/letsencrypt/live/winpexauto.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/winpexauto.com/privkey.pem;

    resolver 127.0.0.11 valid=30s;
    set $makrem_backend makrem-backend;
    set $makrem_frontend makrem-frontend;

    # NextAuth specific - must be handled by Frontend
    location /api/auth/ {
        proxy_pass http://$makrem_frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Backend API
    location /api/ {
        proxy_pass http://$makrem_backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Frontend
    location / {
        proxy_pass http://$makrem_frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

